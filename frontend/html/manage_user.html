<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tài Khoản</title>
    <link rel="stylesheet" href="../css/manageUser.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container">
        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="../html/manage.html">Tổng quan</a></li>
                <li><a href="../html/quanLiSP.html">Sản phẩm</a></li>
                <li><a href="../html/customer.html">Khách hàng</a></li>
                <li><a href="../html/employee.html">Nhân viên</a></li>
                <li><a href="../html/invoice.html">Hóa đơn</a></li>
                <li><a href="../html/manage_user.html" class="active">Tài khoản</a></li>
                <li><a href="../html/attendance.html">Chấm công</a></li>
                <li><a href="../html/payroll.html">Bảng lương</a></li>
                <li><a href="#" onclick="logout()">Đăng xuất</a></li>
            </ul>
        </div>

        <div class="main-content">
            <h2>Quản Lý Tài Khoản</h2>
            
            <!-- Search User -->
            <div class="search-container">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <input type="text" id="search-input" 
                        placeholder="Tìm theo tên đăng nhập hoặc tên nhân viên..." 
                        oninput="filterUsers()">
                </div>
            </div>

            <!-- User Table -->
            <table id="user-table">
                <thead>
                    <tr>
                        <th>Tên đăng nhập</th>
                        <th>Nhân viên</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic user rows will be inserted here -->
                </tbody>
            </table>

            <!-- Add User -->
            <div id="add-user-modal" class="modal">
                <div class="modal-content">
                    <h2>Thêm tài khoản mới</h2>
                    <form id="add-user-form">
                        <label for="add-username">Tên đăng nhập:</label>
                        <input type="text" id="add-username" required>
                        
                        <label for="add-password">Mật khẩu:</label>
                        <input type="password" id="add-password" required>
                        
                        <label for="add-confirm-password">Xác nhận mật khẩu:</label>
                        <input type="password" id="add-confirm-password" required>
                        
                        <label for="add-role">Vai trò:</label>
                        <select id="add-role">
                            <option value="admin">Admin</option>
                            <option value="staff">Staff</option>
                        </select>
                        
                        <div style="margin-top: 20px;">
                            <button type="submit" style="background-color: #2ecc71;">Xác nhận thêm</button>
                            <button type="button" class="cancel-btn" onclick="closeAddUserModal()">Hủy</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Reset Password Modal -->
            <div id="reset-password-modal" class="modal">
                <div class="modal-content">
                    <h2>Cấp lại mật khẩu</h2>
                    <p>Tài khoản: <span id="reset-username-display" style="font-weight: bold; color: #3498db;"></span></p>
                    <form id="reset-password-form">
                        <input type="hidden" id="reset-user-id">
                        
                        <label for="admin-new-password">Mật khẩu mới:</label>
                        <input type="password" id="admin-new-password" placeholder="Nhập mật khẩu mới..." required>
                        
                        <div class="btn-group-modal">
                            <button type="submit" class="btn-confirm">Xác nhận</button>
                            <button type="button" class="btn-cancel" onclick="closeResetModal()">Hủy</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
    <script src="../js/manageUser.js"></script>
</body>
</html>
