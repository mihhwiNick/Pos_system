    <!-- index.html -->
    <!DOCTYPE html>
    <html lang="vi">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quản Lý Khách Hàng</title>
        <link rel="stylesheet" href="../css/customer.css">
    </head>

    <body>
        <div id="toast-container"></div>
        <div class="container">
            <div class="sidebar">
                <h2>Menu</h2>
                <ul>
                    <li><a href="../html/manage.html">Tổng quan</a></li>
                    <li><a href="../html/quanLiSP.html">Sản phẩm</a></li>
                    <li><a href="../html/customer.html"class="active" >Khách hàng</a></li>
                    <li><a href="../html/employee.html">Nhân viên</a></li>
                    <li><a href="../html/invoice.html" >Hóa đơn</a></li>
                    <li><a href="../html/manage_user.html">Tài khoản</a></li>
                    <li><a href="../html/attendance.html">Chấm công</a></li>
                    <li><a href="../html/payroll.html">Bảng lương</a></li>
                    <li><a href="#" onclick="logout()">Đăng xuất</a></li>
                </ul>
            </div>

            <div class="main-content">
                <h2>Quản Lý Khách Hàng</h2>
                <div class="search-container">
                    <div style="display: flex; flex-grow: 1;">
                        <input type="text" id="search" 
                            placeholder="Tìm theo tên hoặc số điện thoại khách hàng..." 
                            oninput="filterCustomers()"> 
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tên khách hàng</th>
                                <th>Số điện thoại</th>
                                <th>Điểm</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="customer-list">
                            <!-- Dữ liệu sẽ được thêm vào đây -->
                            <tr class="customer-row">
                                <td class="customer-id"></td>
                                <td class="customer-name"></td>
                                <td class="customer-phone"></td>
                                <td class="customer-point"></td>
                                <td class="actions"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="pagination" class="pagination-container">
                    <button id="trang_truoc" onclick="trangTruoc()"><img src="../img/prev.png" alt="Prev"></button>
                    <div id="trang_hien_tai">1</div>
                    <button id="trang_sau" onclick="trangSau()"><img src="../img/next.png" alt="Next"></button>
                </div>

                <div id="editCustomerModal" class="modal"style="display: none;">
                    <div class="modal-content">
                        <h2>Sửa Thông Tin Khách Hàng</h2>
                        <div class="edit-customer-form">
                            <div class="form-group">
                                <label for="customerName">Tên Khách Hàng</label>
                                <input type="text" id="customerName" placeholder="Nhập tên khách hàng" required>
                            </div>
                            <div class="form-group">
                                <label for="customerPhone">Số Điện Thoại</label>
                                <input type="tel" id="customerPhone" placeholder="Nhập số điện thoại" required>
                            </div>
                            <div class="form-group">
                                <div class="btn_group">
                                <button class="submit-btn" onclick="updateCustomer()">Cập Nhật</button>
                                <button class="cancel-btn" onclick="closeEditCustomerModal(id)">Hủy</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        <script src="../js/customer.js"></script>
    </body>

    </html>
