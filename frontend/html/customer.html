    <body>
        <div class="container">
            <div class="sidebar">
                <h2>Menu</h2>
                <ul>
                    <li><a href="../html/manage.html">Tổng quan</a></li>

                </ul>
            </div>

            <div class="main-content">
                <h2>Quản lý Khách Hàng</h2>
                <div class="search-container">
                    <input type="text" id="search" placeholder="Nhập nội dung tìm kiếm..."
                        oninput="toggleClearButton()">
                    <span id="clear-btn" onclick="clearSearch()">×</span>
                    <button onclick="searchCustomers()">Tìm kiếm</button>
                </div>
                <div class="search-container">
                    <select id="customerFilter" onchange="filterCustomersByType()">
                        <option value="all">Tất cả</option>
                        <option value="Regular">Regular</option>
                        <option value="VIP">VIP</option>
                    </select>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Mã khách hàng</th>
                                <th>Tên khách hàng</th>
                                <th>Số điện thoại</th>
                                <th>Loại khách hàng</th>
                                <th>Điểm</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="customer-list">
                            <!-- Dữ liệu sẽ được thêm vào đây -->
                            <tr class="customer-row">
                                <td class="customer-id"></td>
                                <td class="customer-name"></td>
                                <td class="customer-phone"></td>
                                <td class="customer-type"></td>
                                <td class="customer-point"></td>
                                <td class="actions"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="pagination"></div>

                <div id="editCustomerModal" class="modal"style="display: none;">
                    <div class="modal-content">
                        <h2>Sửa Thông Tin Khách Hàng</h2>
                        <div class="edit-customer-form">
                            <div class="form-group">
                                <label for="customerName">Tên Khách Hàng</label>
                                <input type="text" id="customerName" placeholder="Nhập tên khách hàng" required>
                            </div>
                            <div class="form-group">
                                <label for="customerPhone">Số Điện Thoại</label>
                                <input type="tel" id="customerPhone" placeholder="Nhập số điện thoại" required>
                            </div>
                            <div class="form-group">
                                <div class="btn_group">
                                <button class="submit-btn" onclick="updateCustomer()">Cập Nhật</button>
                                <button class="cancel-btn" onclick="closeEditCustomerModal(id)">Hủy</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Modal Xác Nhận Xóa -->
                <div id="deleteModal" class="modal">
                    <div class="modal-content">
                        <h2>Xác nhận xóa</h2>
                        <p id="deleteMessage">Bạn có chắc chắn muốn xóa?</p>
                        <div class="modal-actions">
                            <button id="confirmDeleteBtn" onclick="deleteItem()">Xác nhận</button>
                            <button id="cancelDeleteBtn" onclick="closeDeleteModal()">Hủy bỏ</button>
                        </div>
                    </div>
                </div>



            </div>
        </div>
