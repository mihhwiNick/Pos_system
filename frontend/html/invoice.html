<!-- index.html -->
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Hóa Đơn</title>
    <link rel="stylesheet" href="../css/invoice.css">


</head>

<body>
    <div class="container">
        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="../html/manage.html">Tổng quan</a></li>
                <li><a href="../html/quanLiSP.html">Sản phẩm</a></li>
                <li><a href="../html/customer.html">Khách hàng</a></li>
                <li><a href="../html/employee.html">Nhân viên</a></li>
                <li><a href="../html/invoice.html" class="active">Hóa đơn</a></li>
                <li><a href="../html/manage_user.html">Tài khoản</a></li>
                <li><a href="../html/attendance.html">Chấm công</a></li>
                <li><a href="../html/payroll.html">Bảng lương</a></li>
                <li><a href="#" onclick="logout()">Đăng xuất</a></li>
            </ul>
        </div>

        <div class="main-content">
            <h2>Quản Lý Hóa đơn</h2>
            <div class="search-container">
                <div style="display: flex; flex-grow: 1; align-items: center; gap: 10px;">
                    <input type="text" id="search" 
                        placeholder="Tìm theo tên hoặc số điện thoại khách hàng..." 
                        oninput="applyFilters()" style="flex-grow: 1;"> 

                    <span>Từ:</span>
                    <input type="date" id="start-date" onchange="applyFilters()">
                    
                    <span>Đến:</span>
                    <input type="date" id="end-date" onchange="applyFilters()">

                    <button onclick="resetFilters()" style="background-color: #3498db;">Xóa lọc</button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 8%;">Mã HĐ</th>
                            <th style="width: 15%;">Khách hàng</th>
                            <th style="width: 10%;">SĐT</th>
                            <th style="width: 12%;">Ngày tạo</th>
                            <th style="width: 14%;">Người tạo</th>
                            <th style="width: 12%;">Doanh thu gốc</th>
                            <th style="width: 9%;">Điểm dùng</th>
                            <th style="width: 12%;">Thực thu</th>
                            <th style="width: 9%;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="invoice-list">
                        </tbody>
                </table>
            </div>
            <div id="pagination" class="pagination-container">
                <button id="trang_truoc" onclick="trangTruoc()"><img src="../img/prev.png" alt="Prev"></button>
                <div id="trang_hien_tai">1</div>
                <button id="trang_sau" onclick="trangSau()"><img src="../img/next.png" alt="Next"></button>
            </div>

            <!-- Modal Xem Chi Tiết Hóa Đơn -->
            <div id="viewModal" class="modal">
                <div class="modal-content">
                    <h2>Chi Tiết Hóa Đơn</h2>
                    <div id="invoiceDetails">
                        <!-- Các chi tiết hóa đơn sẽ hiển thị ở đây -->
                    </div>
                    <button class="cancel-btn" onclick="closeViewModal()">Đóng</button>
                </div>
            </div>

        </div>
    </div>
    <script src="../js/invoice.js"></script>
</body>

</html>
